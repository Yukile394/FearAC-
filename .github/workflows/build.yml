name: FearAC Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17' # 1.20.1 için Java 17 gereklidir
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build

    - name: Upload Artifact (Plugin JAR)
      uses: actions/upload-artifact@v3
      with:
        name: FearAC-Plugin
        path: build/libs/*-all.jar # Veya projenin çıktı yoluna göre build/libs/*.jar
        
